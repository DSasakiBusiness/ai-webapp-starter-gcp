version: "3.9"

services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    container_name: aiwebapp-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_webapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: aiwebapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- NestJS API ---
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: aiwebapp-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_webapp}?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
      API_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages:/app/packages
      - api_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        cd apps/api &&
        npx prisma generate &&
        npx prisma migrate deploy &&
        npx ts-node-dev --respawn --transpile-only src/main.ts
      "

  # --- Next.js Web ---
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: aiwebapp-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./packages:/app/packages
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    command: >
      sh -c "
        cd apps/web &&
        npm run dev
      "

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  web_node_modules:
